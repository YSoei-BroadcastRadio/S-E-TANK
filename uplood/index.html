<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y. SBC S-E-TANK [管理パネル]</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            background-color: #008080;
            font-family: 'DotGothic16', "MS UI Gothic", "ＭＳ Ｐゴシック", Tahoma, sans-serif;
            color: #000;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0),
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.1) 50%,
                rgba(0, 0, 0, 0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
        }

        .win-window {
            background-color: #d4d0c8;
            border-top: 1px solid #dfdfdf;
            border-left: 1px solid #dfdfdf;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080, 2px 2px 4px rgba(0,0,0,0.3);
            padding: 3px;
            position: relative;
            z-index: 10;
        }

        .win-titlebar {
            background: linear-gradient(90deg, #800000 0%, #ff8080 100%); /* 投稿用は赤系のタイトルバー */
            color: white;
            font-weight: bold;
            padding: 2px 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
        }

        .win-title-btn {
            background-color: #d4d0c8;
            border-top: 1px solid #fff;
            border-left: 1px solid #fff;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            width: 16px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #000;
            cursor: pointer;
            box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #808080;
        }
        .win-title-btn:active {
            border-top: 1px solid #404040;
            border-left: 1px solid #404040;
            border-right: 1px solid #fff;
            border-bottom: 1px solid #fff;
            box-shadow: inset 1px 1px 0 #000, inset -1px -1px 0 #dfdfdf;
            padding-top: 2px;
            padding-left: 1px;
        }

        .win-btn {
            background-color: #d4d0c8;
            border-top: 1px solid #fff;
            border-left: 1px solid #fff;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #808080;
            color: #000;
            cursor: pointer;
            text-align: center;
        }
        .win-btn:active, .win-btn.active-tab {
            border-top: 1px solid #404040;
            border-left: 1px solid #404040;
            border-right: 1px solid #fff;
            border-bottom: 1px solid #fff;
            box-shadow: inset 1px 1px 0 #000, inset -1px -1px 0 #dfdfdf;
            padding-top: 1px;
            padding-left: 1px;
        }
        .win-btn:disabled {
            color: #808080;
            text-shadow: 1px 1px 0 #fff;
            cursor: not-allowed;
        }

        .win-inset {
            background-color: #fff;
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #fff;
            border-bottom: 1px solid #fff;
            box-shadow: inset 1px 1px 0 #000;
        }

        .win-divider {
            border-top: 1px solid #808080;
            border-bottom: 1px solid #fff;
            margin: 8px 0;
        }

        .hidden-page {
            display: none !important;
        }
    </style>
</head>
<body class="min-h-screen p-2 md:p-8 flex justify-center items-start">
    <div class="scanlines"></div>

    <div class="win-window w-full max-w-4xl flex flex-col mt-4">
        
        <div class="win-titlebar">
            <div class="flex items-center gap-1">
                <i class="ph-fill ph-upload-simple text-lg text-white"></i>
                <span>Y. SBC S-E-TANK [クリエイター専用パネル]</span>
            </div>
            <div class="flex gap-1">
                <button class="win-title-btn font-bold">×</button>
            </div>
        </div>

        <div class="flex gap-2 p-2 pb-0 overflow-x-auto" id="tab-container">
            <button id="tab-auth" class="win-btn active-tab px-4 py-1 text-sm relative top-[1px] whitespace-nowrap" onclick="switchPage('auth')">認証(ログイン/登録)</button>
            <button id="tab-mypage" class="win-btn px-4 py-1 text-sm relative top-[1px] whitespace-nowrap hidden-page" onclick="switchPage('mypage')">マイページ</button>
            <button id="tab-upload" class="win-btn px-4 py-1 text-sm relative top-[1px] whitespace-nowrap hidden-page" onclick="switchPage('upload')">音源アップロード</button>
        </div>

        <div class="win-inset p-3 m-2 mt-0 flex-grow" style="min-height: 60vh;">
            
            <div id="page-auth" class="space-y-4 p-2 text-sm">
                <div class="flex items-start gap-4 mb-4">
                    <i class="ph-fill ph-lock-key text-5xl text-yellow-600"></i>
                    <div>
                        <h2 class="font-bold text-lg mb-2">認証が必要です</h2>
                        <p>音源のアップロードを行うには、SBC部員アカウントでのログインが必要です。<br>
                        メールアドレスは必ず <strong>...@soei.ed.jp</strong> のものを使用してください。</p>
                    </div>
                </div>

                <div class="bg-[#ece9d8] p-4 border border-gray-400 max-w-md mx-auto">
                    <form id="auth-form" class="space-y-3">
                        <div>
                            <label class="block mb-1">学校用メールアドレス:</label>
                            <input type="email" id="auth-email" required placeholder="xxx@soei.ed.jp" class="win-inset px-2 py-1 w-full focus:outline-none">
                        </div>
                        <div>
                            <label class="block mb-1">パスワード:</label>
                            <input type="password" id="auth-password" required class="win-inset px-2 py-1 w-full focus:outline-none">
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button type="button" onclick="handleAuth('login')" class="win-btn px-4 py-1 w-1/2">ログイン</button>
                            <button type="button" onclick="handleAuth('register')" class="win-btn px-4 py-1 w-1/2">初回登録</button>
                        </div>
                        <p id="auth-error" class="text-red-600 font-bold text-xs mt-2 text-center"></p>
                    </form>
                </div>
            </div>

            <div id="page-mypage" class="hidden-page space-y-4 p-2 text-sm">
                <div class="flex justify-between items-end border-b border-gray-400 pb-1 mb-4">
                    <h2 class="font-bold text-lg">クリエイター プロフィール設定</h2>
                    <button onclick="logout()" class="win-btn px-3 py-1 text-xs">ログアウト</button>
                </div>

                <form id="profile-form" class="bg-[#ece9d8] p-4 border border-gray-400 max-w-lg mx-auto space-y-3" onsubmit="updateProfile(event)">
                    <p class="text-xs mb-4 text-blue-800">※ 初回ログイン時は必ずプロフィールを設定してください。この情報は「作成者一覧」に表示されます。</p>
                    
                    <div>
                        <label class="block mb-1">表示名 (必須):</label>
                        <input type="text" id="prof-name" required class="win-inset px-2 py-1 w-full focus:outline-none">
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="w-1/2">
                            <label class="block mb-1">入学年度 (西暦):</label>
                            <input type="number" id="prof-year" required min="2000" max="2100" class="win-inset px-2 py-1 w-full focus:outline-none">
                        </div>
                        <div class="w-1/2">
                            <label class="block mb-1">ルート:</label>
                            <select id="prof-route" class="win-inset px-2 py-1 w-full focus:outline-none bg-white">
                                <option value="内進生">内進生</option>
                                <option value="高入生">高入生</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block mb-1">軽い自己紹介:</label>
                        <textarea id="prof-bio" rows="3" class="win-inset px-2 py-1 w-full focus:outline-none resize-none"></textarea>
                    </div>

                    <div class="flex justify-end pt-2">
                        <button type="submit" id="prof-submit-btn" class="win-btn px-6 py-1 font-bold">適用(A)</button>
                    </div>
                </form>
            </div>

            <div id="page-upload" class="hidden-page space-y-4 p-2 text-sm">
                <h2 class="font-bold border-b border-gray-400 pb-1 text-lg mb-4">新規音源のアップロード</h2>

                <form id="upload-form" class="bg-[#ece9d8] p-4 border border-gray-400 max-w-lg mx-auto space-y-4" onsubmit="handleUpload(event)">
                    
                    <div class="win-inset p-3 bg-white">
                        <label class="block mb-1 font-bold">1. 音源ファイル (.mp3, .wav 等)</label>
                        <input type="file" id="up-file" required accept="audio/*" class="w-full text-xs">
                    </div>

                    <div>
                        <label class="block mb-1 font-bold">2. 曲名・ファイル名</label>
                        <input type="text" id="up-title" required placeholder="例: ファンファーレ.mp3" class="win-inset px-2 py-1 w-full focus:outline-none">
                    </div>

                    <div>
                        <label class="block mb-1 font-bold">3. ジャンル・カテゴリ</label>
                        <input type="text" id="up-genre" required placeholder="例: SE / 感情表現" class="win-inset px-2 py-1 w-full focus:outline-none">
                    </div>

                    <div class="win-divider"></div>

                    <div class="flex items-center justify-between">
                        <span id="upload-status" class="font-bold text-blue-700"></span>
                        <button type="submit" id="up-submit-btn" class="win-btn px-8 py-2 font-bold flex items-center gap-2">
                            <i class="ph-bold ph-upload-simple"></i> 送信(S)
                        </button>
                    </div>
                </form>
            </div>

        </div>

        <div class="mt-1 border-t border-[#808080] pt-1 px-2 text-xs flex justify-between bg-[#d4d0c8]">
            <span id="statusbar-text">未ログイン状態です</span>
        </div>
    </div>

    <div id="win-message-box" class="fixed inset-0 bg-transparent flex items-center justify-center z-[100] hidden">
        <div class="win-window w-80 shadow-[2px_2px_10px_rgba(0,0,0,0.5)] relative bg-[#d4d0c8]">
            <div class="win-titlebar">
                <span id="msg-title">情報</span>
                <button type="button" class="win-title-btn font-bold" onclick="closeMessage()">×</button>
            </div>
            <div class="p-4 flex flex-col items-center text-sm">
                <div class="flex items-center gap-4 mb-6 w-full">
                    <i id="msg-icon" class="ph-fill ph-info text-4xl text-blue-600 drop-shadow-sm"></i>
                    <p id="win-message-text" class="flex-grow font-bold"></p>
                </div>
                <button type="button" class="win-btn px-8 py-1" onclick="closeMessage()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://sbc-se-tank-api.ataro-999-qqq.workers.dev'; 
        
        let authToken = localStorage.getItem('sbc_auth_token');

        // --- 初期化処理 ---
        document.addEventListener('DOMContentLoaded', () => {
            if (authToken) {
                loadProfile();
            }
        });

        function switchPage(pageId) {
            const pages = ['auth', 'mypage', 'upload'];
            pages.forEach(id => {
                const pageEl = document.getElementById('page-' + id);
                const tabEl = document.getElementById('tab-' + id);
                if (pageEl) pageEl.classList.add('hidden-page');
                if (tabEl) tabEl.classList.remove('active-tab');
            });
            document.getElementById('page-' + pageId).classList.remove('hidden-page');
            document.getElementById('tab-' + pageId).classList.add('active-tab');
        }

        function updateUIAfterLogin() {
            document.getElementById('tab-auth').classList.add('hidden-page');
            document.getElementById('tab-mypage').classList.remove('hidden-page');
            document.getElementById('tab-upload').classList.remove('hidden-page');
            document.getElementById('statusbar-text').innerText = 'システムに接続済みです。';
            switchPage('mypage');
        }

        function showMessage(text, type = 'info') {
            document.getElementById('win-message-text').innerText = text;
            const icon = document.getElementById('msg-icon');
            const title = document.getElementById('msg-title');
            
            if (type === 'error') {
                icon.className = 'ph-fill ph-x-circle text-4xl text-red-600 drop-shadow-sm';
                title.innerText = 'エラー';
            } else if (type === 'success') {
                icon.className = 'ph-fill ph-check-circle text-4xl text-green-600 drop-shadow-sm';
                title.innerText = '成功';
            } else {
                icon.className = 'ph-fill ph-info text-4xl text-blue-600 drop-shadow-sm';
                title.innerText = '情報';
            }
            
            document.getElementById('win-message-box').classList.remove('hidden');
        }

        function closeMessage() {
            document.getElementById('win-message-box').classList.add('hidden');
        }

        async function handleAuth(action) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');
            errorEl.innerText = '';

            if (!email || !password) {
                errorEl.innerText = '入力されていない項目があります。';
                return;
            }

            if (!email.endsWith('@soei.ed.jp')) {
                errorEl.innerText = '創英のメールアドレス(@soei.ed.jp)のみ許可されています。';
                return;
            }

            try {
                const endpoint = action === 'login' ? '/api/login' : '/api/register';
                const res = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || '通信エラーが発生しました。');

                authToken = data.token;
                localStorage.setItem('sbc_auth_token', authToken);
                
                if (action === 'register') {
                    showMessage('アカウントの登録が完了しました。続けてプロフィールを設定してください。', 'success');
                }
                
                loadProfile();

            } catch (err) {
                errorEl.innerText = err.message;
            }
        }

        function logout() {
            localStorage.removeItem('sbc_auth_token');
            authToken = null;
            
            document.getElementById('tab-auth').classList.remove('hidden-page');
            document.getElementById('tab-mypage').classList.add('hidden-page');
            document.getElementById('tab-upload').classList.add('hidden-page');
            document.getElementById('statusbar-text').innerText = '未ログイン状態です';
            document.getElementById('auth-email').value = '';
            document.getElementById('auth-password').value = '';
            
            switchPage('auth');
        }

        async function loadProfile() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/me`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                if (!res.ok) throw new Error('プロフィールの取得に失敗しました。');

                const data = await res.json();
                
                document.getElementById('prof-name').value = data.name || '';
                document.getElementById('prof-year').value = data.entrance_year || new Date().getFullYear();
                document.getElementById('prof-route').value = data.route || '内進生';
                document.getElementById('prof-bio').value = data.bio || '';

                updateUIAfterLogin();

            } catch (err) {
                showMessage(err.message, 'error');
            }
        }

        async function updateProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('prof-submit-btn');
            btn.disabled = true;
            btn.innerText = '通信中...';

            const payload = {
                name: document.getElementById('prof-name').value,
                entrance_year: parseInt(document.getElementById('prof-year').value),
                route: document.getElementById('prof-route').value,
                bio: document.getElementById('prof-bio').value
            };

            try {
                const res = await fetch(`${API_BASE_URL}/api/me`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}` 
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error('プロフィールの更新に失敗しました。');
                showMessage('プロフィールを更新しました。', 'success');
            } catch (err) {
                showMessage(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = '適用(A)';
            }
        }

        async function handleUpload(e) {
            e.preventDefault();
            const btn = document.getElementById('up-submit-btn');
            const statusEl = document.getElementById('upload-status');
            
            btn.disabled = true;
            statusEl.innerText = 'アップロード中...';

            const file = document.getElementById('up-file').files[0];
            const title = document.getElementById('up-title').value;
            const genre = document.getElementById('up-genre').value;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('title', title);
            formData.append('genre', genre);

            try {
                const res = await fetch(`${API_BASE_URL}/api/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` },
                    body: formData 
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'アップロードに失敗しました。');

                showMessage('音源のアップロードが完了しました！', 'success');
                
                document.getElementById('upload-form').reset();

            } catch (err) {
                showMessage(err.message, 'error');
            } finally {
                btn.disabled = false;
                statusEl.innerText = '';
            }
        }
    </script>
</body>
</html>
